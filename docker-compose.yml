services:

  # -----------------------------
  # ROS2 메인 컨테이너 (rosbridge 포함)
  # -----------------------------
  co_paint:
    build:
      context: ./docker/co_paint
      dockerfile: Dockerfile
    network_mode: host
    env_file: .env
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds.xml
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
    volumes:
      # ROS2 workspace
      - ./docker/co_paint/workspace:/workspace

      # DDS 설정
      - ./middleware/cyclonedds.xml:/cyclonedds.xml:ro
    restart: unless-stopped


  # -----------------------------
  # HTML GCS (nginx)
  # -----------------------------
  web_ui:
    build:
      context: ./docker/web_ui
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - app-network
    ports:
      - "${WEB_UI_PORT:-80}:80"                   # 외부 접근 포트
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped


  # -----------------------------
  # Server (API + ROS 연결)
  # -----------------------------
  server:
    build:
      context: ./docker/server
      dockerfile: Dockerfile
    env_file: .env
    network_mode: host
    volumes:
      - ./docker/server/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy 
    restart: unless-stopped


  # -----------------------------
  # DB
  # -----------------------------
  postgres:
    image: postgres:15
    env_file: .env
    networks:
      - app-network
    ports:  
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
     

  # -----------------------------
  # 네트워크 (컨테이너 간 통신)
  # -----------------------------
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
